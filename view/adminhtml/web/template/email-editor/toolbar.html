<!-- Top Toolbar -->
<div class="ete-toolbar-row">
    <!-- Left: Status & Badges -->
    <div class="ete-toolbar-group ete-toolbar-status-group">
        <span class="ete-status" data-bind="text: statusText, css: statusCssClass"></span>
        <span class="ete-badge" data-bind="visible: showDraftBadge, text: currentTemplateStatus() === 'published' ? $t('PUBLISHED') : $t('DRAFT'), css: currentTemplateStatus() === 'published' ? 'ete-badge-published' : 'ete-badge-draft'"></span>
        <span class="ete-badge ete-badge-schedule" data-bind="visible: showScheduleBadge, i18n: 'SCHEDULED'"></span>
        <span class="ete-badge ete-badge-expired" data-bind="visible: showExpiredBadge, i18n: 'EXPIRED'"></span>
        <!-- ko foreach: getRegion('draftManager') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!-- /ko -->
    </div>

    <!-- Center: Context Controls -->
    <div class="ete-toolbar-group ete-toolbar-context-group">
        <div class="ete-toolbar-control">
            <svg class="ete-toolbar-control-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <select class="ete-toolbar-select" data-bind="options: stores, optionsValue: 'id', optionsText: 'name', value: storeId"></select>
        </div>

        <div class="ete-toolbar-divider"></div>

        <div class="ete-toolbar-control">
            <svg class="ete-toolbar-control-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            <span class="ete-toolbar-control-label" data-bind="text: dataSourceLabel"></span>
            <select class="ete-toolbar-select" data-bind="options: providers, optionsValue: 'code', optionsText: 'label', value: selectedProvider"></select>
        </div>

        <!-- Entity search (appears when provider supports it) -->
        <div class="ete-toolbar-entity-search" data-bind="visible: showEntitySearch">
            <div class="ete-toolbar-search-wrapper">
                <svg class="ete-toolbar-search-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="ete-toolbar-search-input" data-bind="value: entitySearchQuery, valueUpdate: 'afterkeydown', attr: {placeholder: $t('Search...')}" autocomplete="off"/>
            </div>
            <div class="ete-toolbar-search-results" data-bind="visible: entityResults().length > 0, foreach: entityResults">
                <div class="ete-toolbar-search-result-item" data-bind="text: label, click: $parent.selectEntity.bind($parent, $data)"></div>
            </div>
        </div>
    </div>

    <!-- Right: Actions -->
    <div class="ete-toolbar-group ete-toolbar-actions-group">
        <!-- ko if: viewingDefault() -->
        <span class="ete-badge" style="background:#f5f5f5;color:#666666;" data-bind="i18n: 'Default Template (Read-Only)'"></span>
        <!-- /ko -->

        <!-- ko ifnot: viewingDefault() -->
        <!-- ko if: hasPublished() -->
        <span class="ete-toolbar-toggle" data-bind="click: toggleActiveOverride, attr: {title: isOverrideActive() ? 'Disable override' : 'Enable override'}, css: {'ete-toggle-on': isOverrideActive(), 'ete-toggle-off': !isOverrideActive()}">
            <span class="ete-toggle-track"><span class="ete-toggle-thumb"></span></span>
            <span class="ete-toolbar-toggle-label" data-bind="text: isOverrideActive() ? $t('Enabled') : $t('Disabled')"></span>
        </span>

        <div class="ete-toolbar-divider"></div>
        <!-- /ko -->

        <!-- ko if: hasDraft() && currentTemplateStatus() !== 'published' -->
        <a href="#" class="ete-toolbar-text-action" data-bind="click: closeDraft, i18n: 'Close draft'"></a>

        <div class="ete-toolbar-divider"></div>

        <button class="ete-toolbar-action ete-toolbar-action-discard" data-bind="click: discardDraft" title="Discard Draft">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            <span data-bind="i18n: 'Discard'"></span>
        </button>
        <!-- /ko -->

        <div class="ete-toolbar-btn-group">
            <button class="ete-toolbar-action ete-toolbar-action-save" data-bind="click: saveDraft, attr: {title: currentTemplateStatus() === 'published' ? 'Save (Ctrl+S)' : 'Save as Draft (Ctrl+S)'}">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                <span data-bind="text: currentTemplateStatus() === 'published' ? $t('Save') : $t('Save Draft')"></span>
            </button>
            <button class="ete-toolbar-action ete-toolbar-action-primary" data-bind="click: openPublishDialog" title="Publish Template (Ctrl+Shift+P)">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                <span data-bind="i18n: 'Publish'"></span>
            </button>
        </div>

        <button class="ete-toolbar-action" data-bind="click: openVersionHistory" title="Version History (Ctrl+Shift+H)">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span data-bind="i18n: 'History'"></span>
        </button>

        <div style="position:relative;display:inline-flex;">
            <button class="ete-toolbar-action ete-toolbar-action-more" data-bind="click: toggleMoreMenu" title="More actions">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
            <!-- ko foreach: getRegion('moreMenu') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!-- /ko -->
        </div>
        <!-- /ko -->
    </div>
</div>
